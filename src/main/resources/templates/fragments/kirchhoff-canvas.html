<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<body>
<div class="canvas-area" th:fragment="canvas">
    <svg viewBox="-80 0 880 500" id="circuit-svg" preserveAspectRatio="xMidYMid meet">
        <line x1="50" y1="220" x2="50" y2="150" class="wire wire-tot" />
        <line x1="50" y1="150" x2="100" y2="150" class="wire wire-tot" />
        <line x1="160" y1="150" x2="200" y2="150" class="wire wire-tot" />
        <line x1="200" y1="150" x2="200" y2="100" class="wire wire-r2" />
        <line x1="200" y1="150" x2="200" y2="200" class="wire wire-r3" />
        <line x1="200" y1="100" x2="230" y2="100" class="wire wire-r2" />
        <line x1="200" y1="200" x2="230" y2="200" class="wire wire-r3" />
        <line x1="290" y1="100" x2="320" y2="100" class="wire wire-r2" />
        <line x1="290" y1="200" x2="320" y2="200" class="wire wire-r3" />
        <line x1="320" y1="100" x2="320" y2="150" class="wire wire-r2" />
        <line x1="320" y1="200" x2="320" y2="150" class="wire wire-r3" />
        <line x1="320" y1="150" x2="350" y2="150" class="wire wire-tot" />
        <line x1="410" y1="150" x2="450" y2="150" class="wire wire-tot" />
        <line x1="450" y1="150" x2="450" y2="100" class="wire wire-r5" />
        <line x1="450" y1="150" x2="450" y2="200" class="wire wire-r6" />
        <line x1="450" y1="100" x2="480" y2="100" class="wire wire-r5" />
        <line x1="450" y1="200" x2="480" y2="200" class="wire wire-r6" />
        <line x1="540" y1="100" x2="570" y2="100" class="wire wire-r5" />
        <line x1="540" y1="200" x2="570" y2="200" class="wire wire-r6" />
        <line x1="570" y1="100" x2="570" y2="150" class="wire wire-r5" />
        <line x1="570" y1="200" x2="570" y2="150" class="wire wire-r6" />
        <line x1="570" y1="150" x2="720" y2="150" class="wire wire-tot" />
        <line x1="720" y1="150" x2="720" y2="350" class="wire wire-tot" />
        <line x1="720" y1="350" x2="50" y2="350" class="wire wire-tot" />
        <line x1="50" y1="350" x2="50" y2="280" class="wire wire-tot" />

        <circle cx="50" cy="250" r="30" fill="#161b22" stroke="var(--wire-color)" stroke-width="2"/>
        <text x="50" y="243" text-anchor="middle" class="text-label-main">E</text>
        <foreignObject x="20" y="250" width="60" height="25">
            <div class="input-wrapper">
                <input type="number" step="1" id="v1" th:field="*{v1}" class="svg-input" style="color: var(--wire-color);" title="Напряжение E">
                <span class="input-unit" style="color: var(--wire-color);">В</span>
            </div>
        </foreignObject>

        <g th:attr="transform=${circuitData.v1 < 0 ? 'rotate(180 180 150)' : ''}">
            <polygon points="175,143 188,150 175,157" class="arrow-fill wire-tot" />
        </g>
        <g th:attr="transform=${circuitData.v1 < 0 ? 'rotate(180 305 100)' : ''}">
            <polygon points="300,93 313,100 300,107" class="arrow-fill wire-r2" />
        </g>
        <g th:attr="transform=${circuitData.v1 < 0 ? 'rotate(180 305 200)' : ''}">
            <polygon points="300,193 313,200 300,207" class="arrow-fill wire-r3" />
        </g>
        <g th:attr="transform=${circuitData.v1 < 0 ? 'rotate(180 430 150)' : ''}">
            <polygon points="423,143 436,150 423,157" class="arrow-fill wire-tot" />
        </g>
        <g th:attr="transform=${circuitData.v1 < 0 ? 'rotate(180 555 100)' : ''}">
            <polygon points="550,93 563,100 550,107" class="arrow-fill wire-r5" />
        </g>
        <g th:attr="transform=${circuitData.v1 < 0 ? 'rotate(180 555 200)' : ''}">
            <polygon points="550,193 563,200 550,207" class="arrow-fill wire-r6" />
        </g>
        <g th:attr="transform=${circuitData.v1 < 0 ? 'rotate(180 385 350)' : ''}">
            <polygon points="392,343 379,350 392,357" class="arrow-fill wire-tot" />
        </g>

        <text x="130" y="125" text-anchor="middle" class="resistor-name">R1</text>
        <rect x="100" y="135" width="60" height="30" class="component-box" />
        <foreignObject x="100" y="135" width="60" height="30">
            <div class="input-wrapper">
                <input type="number" step="1" id="r1" th:field="*{r1}" class="svg-input" title="R1 (Ом)">
                <span class="input-unit">Ом</span>
            </div>
        </foreignObject>

        <text x="260" y="75" text-anchor="middle" class="resistor-name">R2</text>
        <rect x="230" y="85" width="60" height="30" class="component-box" />
        <foreignObject x="230" y="85" width="60" height="30">
            <div class="input-wrapper">
                <input type="number" step="1" id="r2" th:field="*{r2}" class="svg-input" title="R2 (Ом)">
                <span class="input-unit">Ом</span>
            </div>
        </foreignObject>

        <text x="260" y="175" text-anchor="middle" class="resistor-name">R3</text>
        <rect x="230" y="185" width="60" height="30" class="component-box" />
        <foreignObject x="230" y="185" width="60" height="30">
            <div class="input-wrapper">
                <input type="number" step="1" id="r3" th:field="*{r3}" class="svg-input" title="R3 (Ом)">
                <span class="input-unit">Ом</span>
            </div>
        </foreignObject>

        <text x="380" y="125" text-anchor="middle" class="resistor-name">R4</text>
        <rect x="350" y="135" width="60" height="30" class="component-box" />
        <foreignObject x="350" y="135" width="60" height="30">
            <div class="input-wrapper">
                <input type="number" step="1" id="r4" th:field="*{r4}" class="svg-input" title="R4 (Ом)">
                <span class="input-unit">Ом</span>
            </div>
        </foreignObject>

        <text x="510" y="75" text-anchor="middle" class="resistor-name">R5</text>
        <rect x="480" y="85" width="60" height="30" class="component-box" />
        <foreignObject x="480" y="85" width="60" height="30">
            <div class="input-wrapper">
                <input type="number" step="1" id="r5" th:field="*{r5}" class="svg-input" title="R5 (Ом)">
                <span class="input-unit">Ом</span>
            </div>
        </foreignObject>

        <text x="510" y="175" text-anchor="middle" class="resistor-name">R6</text>
        <rect x="480" y="185" width="60" height="30" class="component-box" />
        <foreignObject x="480" y="185" width="60" height="30">
            <div class="input-wrapper">
                <input type="number" step="1" id="r6" th:field="*{r6}" class="svg-input" title="R6 (Ом)">
                <span class="input-unit">Ом</span>
            </div>
        </foreignObject>
    </svg>

    <div class="field-errors-inline" th:if="${#fields.hasErrors('v1') or #fields.hasErrors('r1') or #fields.hasErrors('r2') or #fields.hasErrors('r3') or #fields.hasErrors('r4') or #fields.hasErrors('r5') or #fields.hasErrors('r6')}">
        <span class="field-error" th:each="error : ${#fields.errors('v1')}" th:text="${error}">Ошибка</span>
        <span class="field-error" th:each="error : ${#fields.errors('r1')}" th:text="${error}">Ошибка</span>
        <span class="field-error" th:each="error : ${#fields.errors('r2')}" th:text="${error}">Ошибка</span>
        <span class="field-error" th:each="error : ${#fields.errors('r3')}" th:text="${error}">Ошибка</span>
        <span class="field-error" th:each="error : ${#fields.errors('r4')}" th:text="${error}">Ошибка</span>
        <span class="field-error" th:each="error : ${#fields.errors('r5')}" th:text="${error}">Ошибка</span>
        <span class="field-error" th:each="error : ${#fields.errors('r6')}" th:text="${error}">Ошибка</span>
    </div>

    <div class="gradient-legend" th:if="${results != null}">
        <div class="gradient-legend-title">Шкала силы тока</div>
        <div class="gradient-bar"></div>
        <div class="gradient-labels">
            <span id="legend-min">0 mA</span>
            <span id="legend-max">0 mA</span>
        </div>
    </div>
</div>
</body>
</html>
