<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Модуль Findeds</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/findeds/css/findeds.css}"/>
</head>
<body>
<div class="container">
    <h1>Цепь с измерительными приборами</h1>

    <div class="switch-container">
        <strong>Замкнуть цепь:</strong>
        <label class="switch">
            <input type="checkbox" id="circuit-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="switch-container">
        <strong>Учитывать погрешности измерений:</strong>
        <label class="switch">
            <input type="checkbox" id="error-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <svg id="circuit-svg" width="700" height="320" viewBox="0 0 700 320">
        <defs>
            <marker id="eds-pointer" markerWidth="8" markerHeight="8" refX="5" refY="5" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="black" />
            </marker>
        </defs>
        <g transform="translate(60, 0)">
            <line class="circuit-line" x1="100" y1="70" x2="180" y2="70" />
            <line class="circuit-line" x1="220" y1="70" x2="270" y2="70" />
            <line class="circuit-line" x1="310" y1="70" x2="360" y2="70" />
            <line class="circuit-line" x1="400" y1="70" x2="446" y2="70" />
            <line class="circuit-line" x1="450" y1="110" x2="450" y2="150" />
            <line class="circuit-line" x1="450" y1="190" x2="450" y2="230" />
            <line class="circuit-line" x1="450" y1="230" x2="100" y2="230" />
            <line class="circuit-line" x1="100" y1="230" x2="100" y2="180" />
            <line class="circuit-line" x1="100" y1="120" x2="100" y2="70" />

            <g>
                <circle cx="100" cy="150" r="30" class="circuit-line" fill="white"/>
                <line x1="100" y1="172" x2="100" y2="132" stroke="black" stroke-width="2" marker-end="url(#eds-pointer)"/>
                <text class="component-text" x="65" y="145" text-anchor="end">ε, r</text>
                <text id="val-eds" class="value-text" x="65" y="160" text-anchor="end">0.00 В</text>
            </g>

            <g transform="translate(180, 55)">
                <rect width="40" height="30" class="circuit-line" fill="white"/>
                <text class="component-text" x="20" y="-10" text-anchor="middle">R</text>
                <text id="val-res" class="value-text" x="20" y="45" text-anchor="middle">0.00 Ом</text>
            </g>

            <g transform="translate(290, 70)">
                <circle r="20" class="circuit-line" fill="white"/>
                <text class="component-text" x="0" y="5" text-anchor="middle">A</text>
                <text id="val-amp" class="value-text" x="0" y="35" text-anchor="middle">0.00 А</text>
            </g>

            <g transform="translate(380, 70)">
                <circle r="20" class="circuit-line" fill="white"/>
                <text class="component-text" x="0" y="5" text-anchor="middle">V</text>
                <text id="val-volt" class="value-text" x="0" y="35" text-anchor="middle">0.00 В</text>
            </g>

            <g>
                <circle cx="450" cy="70" r="4" fill="black"/>
                <circle cx="450" cy="110" r="4" fill="black"/>
                <line id="svg-switch-lever" x1="450" y1="70" x2="450" y2="108" />
            </g>

            <g transform="translate(450, 170)">
                <circle id="light-bulb" r="20" fill="lightgray"/>
                <line x1="-14" y1="-14" x2="14" y2="14" stroke="black"/>
                <line x1="14" y1="-14" x2="-14" y2="14" stroke="black"/>
                <text class="component-text" x="25" y="5">L</text>
            </g>
        </g>
    </svg>

    <form id="params-form">
        <div class="form-group">
            <label>Ток (I), А:</label>
            <input type="number" step="any" id="amperage-input" required>
        </div>
        <div class="form-group">
            <label>r (внутр.), Ом:</label>
            <input type="number" step="any" id="inResistance-input" required>
        </div>
        <div class="form-group" style="grid-column: span 2;">
            <label>R (внеш.), Ом:</label>
            <input type="number" step="any" id="outResistance-input" required>
        </div>
    </form>

    <div class="result">
        ЭДС (ε) = <strong id="eds-display">0.00</strong> В
        <div id="error-display" class="error-info"></div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    window.initialData = {
        amperage: /*[[${physicsModel.amperage}]]*/ 6,
        inResistance: /*[[${physicsModel.inResistance}]]*/ 400,
        outResistance: /*[[${physicsModel.outResistance}]]*/ 1100,
        eds: /*[[${edsValue}]]*/ 0
    };
    window.csrfToken = null;
    window.csrfHeader = 'X-CSRF-TOKEN';
    /*]]>*/
</script>
<script th:src="@{/findeds/js/findeds.js}"></script>
</body>
</html>
