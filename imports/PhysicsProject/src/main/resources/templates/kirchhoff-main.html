<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симуляция Законов Кирхгофа</title>
    <link rel="stylesheet" th:href="@{/css/kirchhoff-style.css}">
</head>
<body>
<div th:replace="~{fragments/kirchhoff-header :: pageHeader}"></div>

<form class="container" th:action="@{/}" th:object="${circuitData}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <div th:replace="~{fragments/kirchhoff-sidebar :: sidebar}"></div>
    <div class="sidebar-resizer" id="sidebar-resizer" aria-hidden="true"></div>
    <div th:replace="~{fragments/kirchhoff-canvas :: canvas}"></div>
</form>

<script th:src="@{/js/kirchhoff-script.js}"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        initSidebarResize();
        var results = /*[[${results}]]*/ null;
        if (results) {
            applyCircuitColors(results);
        }
    });
</script>

</body>
</html>
